[pytest]
# pytest設定ファイル
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=pomodoro
    --cov=app
    --cov-report=html
    --cov-report=term-missing
markers =
    unit: ユニットテスト
    integration: 統合テスト
    e2e: エンドツーエンドテスト
