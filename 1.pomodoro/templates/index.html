<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- ヘッダー -->
            <div class="header">
                <h1 class="title">ポモドーロタイマー</h1>
                <div class="window-controls">
                    <button class="control-btn">−</button>
                    <button class="control-btn">□</button>
                    <button class="control-btn">✕</button>
                </div>
            </div>

            <!-- ステータス表示 -->
            <div class="status">作業中</div>

            <!-- タイマー表示（円形プログレス + 時間） -->
            <div class="timer-section">
                <svg class="circular-progress" viewBox="0 0 100 100">
                    <!-- 背景（グレー） -->
                    <circle cx="50" cy="50" r="45" class="progress-bg"></circle>
                    <!-- プログレス（紫） -->
                    <circle cx="50" cy="50" r="45" class="progress-bar" style="stroke-dashoffset: 35.34;"></circle>
                </svg>
                <div class="time-display">25:00</div>
            </div>

            <!-- ボタングループ -->
            <div class="button-group">
                <button class="btn btn-primary">開始</button>
                <button class="btn btn-secondary">リセット</button>
            </div>

            <!-- 今日の進捗カード -->
            <div class="progress-card">
                <h2 class="progress-title">今日の進捗</h2>
                <div class="progress-info">
                    <div class="progress-item">
                        <div class="progress-number">4</div>
                        <div class="progress-label">完了</div>
                    </div>
                    <div class="progress-item">
                        <div class="progress-time">1時間40分</div>
                        <div class="progress-label">集中時間</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
